<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>จิ๊กซอว์การคูณจำนวนเต็ม</title>

<style>
body{
font-family:tahoma;
background:#f5f5f5;
text-align:center;
padding:20px;
}

.puzzle,.board,.answers{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
max-width:700px;
margin:auto;
}

.piece,.cell,.answer{
height:100px;
border-radius:10px;
overflow:hidden;
}

.piece{
background:#ccc;
}

.cell{
background:#e0e0e0;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
padding:10px;
}

.answer{
position:relative;
cursor:grab;
}

.answer img{
width:100%;
height:100%;
object-fit:cover;
}

.number{
position:absolute;
bottom:5px;
right:5px;
background:black;
color:white;
padding:4px 8px;
border-radius:5px;
}

.correct{
background:#8bc34a;
color:white;
}
</style>
</head>

<body>

<h2>🧩 จิ๊กซอว์การคูณจำนวนเต็ม</h2>

<div id="score">0 / 12</div>

<br>

<div id="puzzle"></div>

<br>

<div id="board"></div>

<br>

<div id="answers"></div>

<script>

const imageFile = "IMG_1460.png";

const questions = [
{q:"(-3) × 4",a:-12},
{q:"(-5) × (-6)",a:30},
{q:"7 × (-8)",a:-56},
{q:"(-9) × 5",a:-45},
{q:"(-8) × (-7)",a:56},
{q:"6 × (-9)",a:-54},
{q:"(-10) × 4",a:-40},
{q:"(-11) × (-3)",a:33},
{q:"12 × (-5)",a:-60},
{q:"(-7) × (-8)",a:56},
{q:"15 × (-4)",a:-60},
{q:"(-12) × (-6)",a:72}
];

let opened = [];
let score = 0;

createPuzzle();
createBoard();
createAnswers();

function createPuzzle(){

let html = '<div class="puzzle">';

for(let i=0;i<12;i++){

if(opened.includes(i)){

html += `
<div class="piece">
<img src="${imageFile}"
style="
width:400%;
height:300%;
margin-left:-${(i%4)*100}%;
margin-top:-${Math.floor(i/4)*100}%;">
</div>
`;

}else{

html += `<div class="piece"></div>`;

}

}

html += "</div>";

document.getElementById("puzzle").innerHTML = html;

}

function createBoard(){

let html = '<div class="board">';

questions.forEach((item,index)=>{

html += `
<div class="cell"
data-answer="${item.a}"
data-index="${index}"
ondragover="allowDrop(event)"
ondrop="drop(event)">
${item.q}
</div>
`;

});

html += "</div>";

document.getElementById("board").innerHTML = html;

}

function createAnswers(){

let html = '<div class="answers">';

questions.forEach((item,index)=>{

if(!opened.includes(index)){

html += `
<div class="answer"
draggable="true"
data-answer="${item.a}"
data-index="${index}"
ondragstart="drag(event)">

<img src="${imageFile}"
style="
width:400%;
height:300%;
margin-left:-${(index%4)*100}%;
margin-top:-${Math.floor(index/4)*100}%">

<div class="number">${item.a}</div>

</div>
`;

}

});

html += "</div>";

document.getElementById("answers").innerHTML = html;

}

function drag(event){

event.dataTransfer.setData(
"answer",
event.currentTarget.dataset.answer
);

event.dataTransfer.setData(
"index",
event.currentTarget.dataset.index
);

}

function allowDrop(event){
event.preventDefault();
}

function drop(event){

event.preventDefault();

let answer =
event.dataTransfer.getData("answer");

let index =
event.dataTransfer.getData("index");

if(answer == event.currentTarget.dataset.answer){

opened.push(Number(index));

score++;

event.currentTarget.innerHTML = "✅ ถูกต้อง";
event.currentTarget.classList.add("correct");

document.getElementById("score").innerHTML =
score + " / 12";

createPuzzle();
createAnswers();

if(score == 12){

alert("🎉 ต่อจิ๊กซอว์สำเร็จ");

}

}else{

alert("❌ ลองใหม่");

}

}

</script>

</body>
</html>
