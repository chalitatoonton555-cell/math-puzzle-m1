<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>จิ๊กซอว์การคูณจำนวนเต็ม</title>

<style>

body{
    font-family:Tahoma,sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:30px;
}

.box{
    background:white;
    max-width:700px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    padding:10px;
    font-size:18px;
    width:180px;
}

button{
    background:#ff9800;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#f57c00;
}

img{
    max-width:100%;
    border-radius:15px;
    margin-top:20px;
}

.puzzle{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:2px;
max-width:500px;
margin:auto;
}

.piece{
    width:100%;
    aspect-ratio:1/1;
    background:#ddd;
    overflow:hidden;
    position:relative;
}

</style>
</head>

<body>

<div class="box" id="game">

<h1>🧩 จิ๊กซอว์การคูณจำนวนเต็ม</h1>

<p>นักเรียนชั้นมัธยมศึกษาปีที่ 1</p>

<input type="text"
id="studentName"
placeholder="กรอกชื่อ">

<br><br>

<button onclick="startGame()">
เริ่มทำใบงาน
</button>

</div>

<script>

let currentQuestion = 0;
let score = 0;
let questions = [];
let selectedImage = "";

const worksheets = [

/* ใบงานที่ 1 */
[
{q:"(-3) × 4",a:-12},
{q:"(-5) × (-6)",a:30},
{q:"7 × (-8)",a:-56},
{q:"(-9) × 5",a:-45},
{q:"(-8) × (-7)",a:56},
{q:"6 × (-9)",a:-54},
{q:"(-10) × 4",a:-40},
{q:"(-11) × (-3)",a:33},
{q:"12 × (-5)",a:-60},
{q:"(-7) × (-8)",a:56},
{q:"15 × (-4)",a:-60},
{q:"(-12) × (-6)",a:72}
],

/* ใบงานที่ 2 */
[
{q:"(-2) × 8",a:-16},
{q:"(-7) × (-5)",a:35},
{q:"9 × (-6)",a:-54},
{q:"(-4) × 12",a:-48},
{q:"(-8) × (-9)",a:72},
{q:"5 × (-11)",a:-55},
{q:"(-6) × 7",a:-42},
{q:"(-10) × (-8)",a:80},
{q:"14 × (-3)",a:-42},
{q:"(-15) × 2",a:-30},
{q:"(-9) × (-4)",a:36},
{q:"16 × (-5)",a:-80}
],

/* ใบงานที่ 3 */
[
{q:"(-4) × 6",a:-24},
{q:"(-8) × (-4)",a:32},
{q:"11 × (-5)",a:-55},
{q:"(-12) × 3",a:-36},
{q:"(-7) × (-7)",a:49},
{q:"8 × (-9)",a:-72},
{q:"(-5) × 10",a:-50},
{q:"(-11) × (-2)",a:22},
{q:"13 × (-4)",a:-52},
{q:"(-14) × 5",a:-70},
{q:"(-6) × (-8)",a:48},
{q:"15 × (-3)",a:-45}
],

/* ใบงานที่ 4 */
[
{q:"(-3) × 9",a:-27},
{q:"(-10) × (-5)",a:50},
{q:"7 × (-7)",a:-49},
{q:"(-8) × 6",a:-48},
{q:"(-9) × (-8)",a:72},
{q:"12 × (-4)",a:-48},
{q:"(-5) × 11",a:-55},
{q:"(-7) × (-6)",a:42},
{q:"15 × (-2)",a:-30},
{q:"(-13) × 4",a:-52},
{q:"(-4) × (-9)",a:36},
{q:"16 × (-3)",a:-48}
],

/* ใบงานที่ 5 */
[
{q:"(-2) × 11",a:-22},
{q:"(-6) × (-7)",a:42},
{q:"8 × (-8)",a:-64},
{q:"(-9) × 4",a:-36},
{q:"(-10) × (-6)",a:60},
{q:"7 × (-12)",a:-84},
{q:"(-3) × 13",a:-39},
{q:"(-8) × (-5)",a:40},
{q:"14 × (-4)",a:-56},
{q:"(-15) × 3",a:-45},
{q:"(-11) × (-4)",a:44},
{q:"18 × (-2)",a:-36}
]

];
const images = [
"IMG_1460.png",
"IMG_1461.png",
"IMG_1462.png",
"IMG_1463.png",
"IMG_1464.png"
];
    
function startGame(){

currentQuestion = 0;
score = 0;

let randomWorksheet =
Math.floor(Math.random() * worksheets.length);

questions =
worksheets[randomWorksheet];

let randomImage =
Math.floor(Math.random() * images.length);

selectedImage =
images[randomImage];

showQuestion();

}

function checkAnswer(){

let ans =
document.getElementById("answer").value;

if(ans == questions[currentQuestion].a){

score++;
currentQuestion++;

if(currentQuestion < questions.length){

showQuestion();

}else{

showSuccess();

}

}else{

alert("ลองใหม่อีกครั้ง");

}

}
function createPuzzle(){

let html = '<div class="puzzle">';

for(let i=0;i<12;i++){

if(i < score){

html += `
<div class="piece">

<img
src="${selectedImage}"
style="
width:400%;
height:300%;
max-width:none;
border-radius:0;
margin-top:-${Math.floor(i/4)*100}%;
margin-left:-${(i%4)*100}%;
">

</div>
`;

}else{

html += `
<div class="piece"></div>
`;

}

}

html += '</div>';

return html;

}
function showQuestion(){

document.getElementById("game").innerHTML = `

<h2>จิ๊กซอว์การคูณจำนวนเต็ม</h2>

<p><b>ตอบถูกแล้ว ${score} / 12 ข้อ</b></p>

${createPuzzle()}

<p>ข้อ ${currentQuestion + 1}</p>

<h3>
${questions[currentQuestion].q} = ?
</h3>

<input id="answer">

<br><br>

<button onclick="checkAnswer()">
ตรวจคำตอบ
</button>

`;

}
function showSuccess(){

document.getElementById("game").innerHTML = `

<h2>🎉 ทำใบงานครบ 12 ข้อแล้ว</h2>

<p>คะแนน ${score} / 12</p>

<img src="${selectedImage}">

<br><br>

<button onclick="startGame()">
ทำใหม่อีกครั้ง
</button>

`;

}
</script>

</body>
</html>
