<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>จิ๊กซอว์การคูณจำนวนเต็ม</title>

<style>
body{
    font-family:Tahoma,sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:30px;
}

.box{
    background:white;
    max-width:600px;
    margin:auto;
    padding:20px;
    border-radius:15px;
}

button{
    background:#ff9800;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    font-size:18px;
}
</style>

</head>

<body>

<div class="box">

<h1>🧩 จิ๊กซอว์การคูณจำนวนเต็ม</h1>

<p>นักเรียนชั้นมัธยมศึกษาปีที่ 1</p>

<input type="text"
placeholder="กรอกชื่อของนักเรียน">

<br><br>

<button onclick="startGame()">
เริ่มทำใบงาน
</button>

<script>
function startGame(){

document.querySelector(".box").innerHTML = `
<h2>ใบงานที่ 1</h2>

<p>ข้อ 1 : (-3) × 4 = ?</p>

<input id="answer">

<br><br>

<button onclick="checkAnswer()">
ตรวจคำตอบ
</button>

`;

}

function checkAnswer(){

let ans =
document.getElementById("answer").value;

if(ans == -12){

alert("ตอบถูก");

}else{

alert("ลองใหม่อีกครั้ง");

}

}
</script>

</body>
</html>
