<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>จิ๊กซอว์การคูณจำนวนเต็ม</title>

<style>

body{
    font-family:Tahoma,sans-serif;
    background:#f5f5f5;
    text-align:center;
    padding:30px;
}

.box{
    background:white;
    max-width:600px;
    margin:auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    padding:10px;
    font-size:18px;
    width:150px;
}

button{
    background:#ff9800;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#f57c00;
}

</style>

</head>

<body>

<div class="box" id="game">

<h1>🧩 จิ๊กซอว์การคูณจำนวนเต็ม</h1>

<p>นักเรียนชั้นมัธยมศึกษาปีที่ 1</p>

<input type="text" id="studentName"
placeholder="กรอกชื่อ">

<br><br>

<button onclick="startGame()">
เริ่มทำใบงาน
</button>

</div>

<script>

let currentQuestion = 0;

const questions = [

{q:"(-3) × 4",a:-12},
{q:"(-5) × (-6)",a:30},
{q:"7 × (-8)",a:-56},
{q:"(-9) × 5",a:-45},
{q:"(-8) × (-7)",a:56},
{q:"6 × (-9)",a:-54},
{q:"(-10) × 4",a:-40},
{q:"(-11) × (-3)",a:33},
{q:"12 × (-5)",a:-60},
{q:"(-7) × (-8)",a:56},
{q:"15 × (-4)",a:-60},
{q:"(-12) × (-6)",a:72}

];

function startGame(){

showQuestion();

}

function showQuestion(){

document.getElementById("game").innerHTML = `

<h2>ใบงานที่ 1</h2>

<p>
ข้อ ${currentQuestion + 1}
</p>

<h3>
${questions[currentQuestion].q} = ?
</h3>

<input id="answer">

<br><br>

<button onclick="checkAnswer()">
ตรวจคำตอบ
</button>

`;

}

function checkAnswer(){

let ans =
document.getElementById("answer").value;

if(ans == questions[currentQuestion].a){

currentQuestion++;

if(currentQuestion < questions.length){

showQuestion();

}else{

document.getElementById("game").innerHTML = `

<h2>🎉 ทำใบงานครบ 12 ข้อแล้ว</h2>

<p>ยินดีด้วย</p>

`;

}

}else{

alert("ลองใหม่อีกครั้ง");

}

}

</script>

</body>
</html>
